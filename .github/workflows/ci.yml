name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]
  repository_dispatch:
    types: [build-chain, upstream-changed]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test execution and coverage steps'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  CARGO_INCREMENTAL: '1'

jobs:
  setup:
    name: Setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]')))
    outputs:
      cache-key: ${{ steps.setup-cache.outputs.cache-key }}
    steps:
      - name: Disk check
        run: |
          df -h
          if [ $(df / | tail -1 | awk '{print $5}' | sed 's/%//') -gt 80 ]; then
            find /tmp/runner-cache -maxdepth 2 -type d -mtime +7 -exec rm -rf {} + 2>/dev/null || true
            df -h
          fi

      - uses: actions/checkout@v4
      
      - name: Cache
        id: setup-cache
        run: |
          CACHE_ROOT="/tmp/runner-cache"
          
          # Generate cache key from Cargo.lock hash
          DEPS_KEY=$(sha256sum Cargo.lock | cut -d' ' -f1)
          
          # Include toolchain version in cache key
          TOOLCHAIN=$(grep -E '^channel|rust-version' rust-toolchain.toml Cargo.toml 2>/dev/null | head -1 | sha256sum | cut -d' ' -f1 || echo "1.88.0")
          
          CACHE_KEY="${DEPS_KEY}-${TOOLCHAIN}"
          
          # Set up cache directories
          CARGO_CACHE_DIR="$CACHE_ROOT/cargo/$CACHE_KEY"
          TARGET_CACHE_DIR="$CACHE_ROOT/target/$CACHE_KEY"
          
          echo "CARGO_CACHE_DIR=$CARGO_CACHE_DIR" >> $GITHUB_ENV
          echo "TARGET_CACHE_DIR=$TARGET_CACHE_DIR" >> $GITHUB_ENV
          
          echo "cache-key=$CACHE_KEY" >> $GITHUB_OUTPUT
          
          mkdir -p "$CARGO_CACHE_DIR"/{registry,git} "$TARGET_CACHE_DIR"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0

  test:
    name: Test
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache
        run: |
          CACHE_ROOT="/tmp/runner-cache"
          CACHE_KEY="${{ needs.setup.outputs.cache-key }}"
          echo "CARGO_CACHE_DIR=$CACHE_ROOT/cargo/$CACHE_KEY" >> $GITHUB_ENV
          echo "TARGET_CACHE_DIR=$CACHE_ROOT/target/$CACHE_KEY" >> $GITHUB_ENV
      
      - name: Restore registry
        run: |
          if [ -d "$CARGO_CACHE_DIR/registry" ] && [ "$(ls -A $CARGO_CACHE_DIR/registry 2>/dev/null)" ]; then
            mkdir -p "$HOME/.cargo/registry"
            rsync -a --delete "$CARGO_CACHE_DIR/registry/" "$HOME/.cargo/registry/" || true
          else
            echo "💿 No Cargo registry cache found"
          fi
      
      - name: Restore git
        run: |
          if [ -d "$CARGO_CACHE_DIR/git" ] && [ "$(ls -A $CARGO_CACHE_DIR/git 2>/dev/null)" ]; then
            mkdir -p "$HOME/.cargo/git"
            rsync -a --delete "$CARGO_CACHE_DIR/git/" "$HOME/.cargo/git/" || true
          else
            echo "💿 No Cargo git cache found"
          fi
      
      - name: Restore target
        run: |
          if [ -d "$TARGET_CACHE_DIR" ] && [ "$(ls -A $TARGET_CACHE_DIR 2>/dev/null)" ]; then
            rsync -a --delete "$TARGET_CACHE_DIR/" ./target/ || true
          else
            echo "💿 No target cache found, will build from scratch"
          fi
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      
      - name: Run tests with coverage
        run: |
          # Install tarpaulin
          cargo install cargo-tarpaulin --version 0.27.0
          
          # Run tests with coverage in one step
          # Use --lib --bins --tests to ensure all test types run
          # Use --skip-clean to reuse cached build artifacts, --timeout to prevent hangs
          cargo tarpaulin --lib --bins --tests --out xml --output-dir coverage --skip-clean --timeout 120
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage/cobertura.xml
      
      - name: Cache registry
        if: always()
        run: |
          if [ -d "$HOME/.cargo/registry" ] && [ "$CARGO_CACHE_DIR" != "" ]; then
            rsync -a --delete "$HOME/.cargo/registry/" "$CARGO_CACHE_DIR/registry/" || true
          fi
      
      - name: Cache git
        if: always()
        run: |
          if [ -d "$HOME/.cargo/git" ] && [ "$CARGO_CACHE_DIR" != "" ]; then
            rsync -a --delete "$HOME/.cargo/git/" "$CARGO_CACHE_DIR/git/" || true
          fi
      
      - name: Cache target
        if: always()
        run: |
          if [ -d "./target" ] && [ "$TARGET_CACHE_DIR" != "" ]; then
            rsync -a --delete "./target/" "$TARGET_CACHE_DIR/" || true
          fi
      
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up old caches..."
          CACHE_ROOT="/tmp/runner-cache"
          find "$CACHE_ROOT/cargo" -maxdepth 1 -type d -mtime +1 2>/dev/null | head -n -5 | xargs rm -rf 2>/dev/null || true
          find "$CACHE_ROOT/target" -maxdepth 1 -type d -mtime +1 2>/dev/null | head -n -3 | xargs rm -rf 2>/dev/null || true

  clippy:
    name: Clippy
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache
        run: |
          CACHE_ROOT="/tmp/runner-cache"
          CACHE_KEY="${{ needs.setup.outputs.cache-key }}"
          echo "CARGO_CACHE_DIR=$CACHE_ROOT/cargo/$CACHE_KEY" >> $GITHUB_ENV
      
      - name: Restore registry
        run: |
          if [ -d "$CARGO_CACHE_DIR/registry" ] && [ "$(ls -A $CARGO_CACHE_DIR/registry 2>/dev/null)" ]; then
            mkdir -p "$HOME/.cargo/registry"
            rsync -a --delete "$CARGO_CACHE_DIR/registry/" "$HOME/.cargo/registry/" || true
          fi
      
      - name: Restore git
        run: |
          if [ -d "$CARGO_CACHE_DIR/git" ] && [ "$(ls -A $CARGO_CACHE_DIR/git 2>/dev/null)" ]; then
            mkdir -p "$HOME/.cargo/git"
            rsync -a --delete "$CARGO_CACHE_DIR/git/" "$HOME/.cargo/git/" || true
          fi
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          components: clippy
      
      - name: Run clippy
        run: cargo clippy --lib --bins --all-features -- -D warnings

  fmt:
    name: Format
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          components: rustfmt
      
      - name: Check formatting
        run: cargo fmt --all -- --check

  docs:
    name: Docs
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache
        run: |
          CACHE_ROOT="/tmp/runner-cache"
          CACHE_KEY="${{ needs.setup.outputs.cache-key }}"
          echo "CARGO_CACHE_DIR=$CACHE_ROOT/cargo/$CACHE_KEY" >> $GITHUB_ENV
      
      - name: Restore registry
        run: |
          if [ -d "$CARGO_CACHE_DIR/registry" ] && [ "$(ls -A $CARGO_CACHE_DIR/registry 2>/dev/null)" ]; then
            mkdir -p "$HOME/.cargo/registry"
            rsync -a --delete "$CARGO_CACHE_DIR/registry/" "$HOME/.cargo/registry/" || true
          fi
      
      - name: Restore git
        run: |
          if [ -d "$CARGO_CACHE_DIR/git" ] && [ "$(ls -A $CARGO_CACHE_DIR/git 2>/dev/null)" ]; then
            mkdir -p "$HOME/.cargo/git"
            rsync -a --delete "$CARGO_CACHE_DIR/git/" "$HOME/.cargo/git/" || true
          fi
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      
      - name: Build docs
        run: cargo doc --no-deps
      
      - name: Check docs
        run: cargo doc --no-deps --document-private-items

  security:
    name: Security
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]')))
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.21.0 --locked
      
      - name: Run security audit
        run: cargo audit

  build:
    name: Build
    needs: 
      - setup
      - test
      - clippy
      - fmt
      - docs
      - security
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      always() &&
      needs.setup.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      ((github.event_name == 'workflow_dispatch' && github.event.inputs.skip_tests == 'true') ||
       (needs.test.result == 'success' && needs.clippy.result == 'success' && 
        needs.fmt.result == 'success' && needs.docs.result == 'success' && 
        needs.security.result == 'success'))
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache
        run: |
          CACHE_ROOT="/tmp/runner-cache"
          CACHE_KEY="${{ needs.setup.outputs.cache-key }}"
          echo "CARGO_CACHE_DIR=$CACHE_ROOT/cargo/$CACHE_KEY" >> $GITHUB_ENV
          echo "TARGET_CACHE_DIR=$CACHE_ROOT/target/$CACHE_KEY" >> $GITHUB_ENV
      
      - name: Restore registry
        run: |
          if [ -d "$CARGO_CACHE_DIR/registry" ] && [ "$(ls -A $CARGO_CACHE_DIR/registry 2>/dev/null)" ]; then
            mkdir -p "$HOME/.cargo/registry"
            rsync -a --delete "$CARGO_CACHE_DIR/registry/" "$HOME/.cargo/registry/" || true
          fi
      
      - name: Restore git
        run: |
          if [ -d "$CARGO_CACHE_DIR/git" ] && [ "$(ls -A $CARGO_CACHE_DIR/git 2>/dev/null)" ]; then
            mkdir -p "$HOME/.cargo/git"
            rsync -a --delete "$CARGO_CACHE_DIR/git/" "$HOME/.cargo/git/" || true
          fi
      
      - name: Restore target
        run: |
          if [ -d "$TARGET_CACHE_DIR" ] && [ "$(ls -A $TARGET_CACHE_DIR 2>/dev/null)" ]; then
            rsync -a --delete "$TARGET_CACHE_DIR/" ./target/ || true
          fi
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      
      - name: Build
        run: cargo build --release
      
      - name: Cache target
        if: always()
        run: |
          if [ -d "./target" ] && [ "$TARGET_CACHE_DIR" != "" ]; then
            rsync -a --delete "./target/" "$TARGET_CACHE_DIR/" || true
          fi

  release:
    name: Release
    needs: [build, test, clippy, fmt, docs, security]
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]') &&
        !contains(github.event.head_commit.message, '[skip release]'))) &&
      ((github.event_name == 'workflow_dispatch' && github.event.inputs.skip_tests == 'true') ||
       (needs.test.result == 'success' && needs.clippy.result == 'success' && 
        needs.fmt.result == 'success' && needs.docs.result == 'success' && 
        needs.security.result == 'success'))
    permissions:
      contents: read
      id-token: write
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      
      - name: Determine version
        id: version
        run: |
          # Auto-increment patch version from Cargo.toml
          # Extract only the package version (first version = after [package])
          CURRENT=$(grep -A 10 '^\[package\]' Cargo.toml | grep '^version = ' | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ -z "$CURRENT" ]; then
            echo "❌ Could not determine current version from Cargo.toml"
            echo "Debug: Looking for version in [package] section"
            grep -A 10 '^\[package\]' Cargo.toml | head -10
            exit 1
          fi
          
          echo "Current version: ${CURRENT}"
          
          # Validate version format (should be X.Y.Z)
          if ! echo "$CURRENT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Invalid version format: ${CURRENT} (expected X.Y.Z)"
            exit 1
          fi
          
          # Increment patch version (X.Y.Z -> X.Y.(Z+1))
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          
          # Validate components are numeric
          if ! [[ "$MAJOR" =~ ^[0-9]+$ ]] || ! [[ "$MINOR" =~ ^[0-9]+$ ]] || ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "❌ Version components must be numeric: ${MAJOR}.${MINOR}.${PATCH}"
            exit 1
          fi
          
          PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          
          # Same version tag for blvm-sdk and blvm-sdk-macros; both must be free on crates.io
          crate_version_exists() {
            C="$1"
            V="$2"
            API_RESPONSE=$(curl -s --max-time 10 "https://crates.io/api/v1/crates/${C}/versions" 2>/dev/null || echo "")
            if [ -n "$API_RESPONSE" ] && ! echo "$API_RESPONSE" | grep -q '"detail"'; then
              if command -v jq &> /dev/null; then
                X=$(echo "$API_RESPONSE" | jq -r ".versions[] | select(.num == \"${V}\") | .num" | head -1)
                [ "$X" = "$V" ] && return 0
              elif echo "$API_RESPONSE" | grep -q "\"num\":\"${V}\""; then
                return 0
              fi
            fi
            SO=$(cargo search "$C" --limit 100 2>/dev/null || echo "")
            echo "$SO" | grep -qE "\"${C}\".*\"${V}\"" && return 0
            return 1
          }
          
          MAX_ATTEMPTS=10
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            echo "Checking blvm-sdk + blvm-sdk-macros v${VERSION} on crates.io..."
            cargo update --dry-run 2>/dev/null || true
            EXISTS_SDK=false
            EXISTS_MACROS=false
            crate_version_exists blvm-sdk "$VERSION" && EXISTS_SDK=true
            crate_version_exists blvm-sdk-macros "$VERSION" && EXISTS_MACROS=true
            if [ "$EXISTS_SDK" = true ] || [ "$EXISTS_MACROS" = true ]; then
              echo "⚠️  blvm-sdk (${EXISTS_SDK}) or blvm-sdk-macros (${EXISTS_MACROS}) already has v${VERSION}; bumping patch..."
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f2)
              PATCH=$(echo "$VERSION" | cut -d. -f3)
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
              ATTEMPT=$((ATTEMPT + 1))
            else
              echo "✅ v${VERSION} is available for both crates"
              break
            fi
          done
          
          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ Failed to find available version after ${MAX_ATTEMPTS} attempts"
            exit 1
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ Releasing version: ${VERSION}"
      
      - name: Get latest blvm-node version from crates.io
        id: node-version
        run: |
          NODE_VER=$(cargo search blvm-node --limit 1 2>/dev/null | head -1 | sed -E 's/^blvm-node = "([^"]+)".*/\1/' || echo "")
          if [ -z "$NODE_VER" ]; then
            echo "❌ blvm-node not found on crates.io. It must be published first."
            exit 1
          fi
          echo "version=${NODE_VER}" >> $GITHUB_OUTPUT
          echo "Using blvm-node version: ${NODE_VER}"
      
      - name: Update Cargo.toml to use crates.io dependencies
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NODE_VER="${{ steps.node-version.outputs.version }}"
          
          # Root blvm-sdk version
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          
          # blvm-sdk-macros subcrate (same release version)
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" crates/blvm-sdk-macros/Cargo.toml
          
          # Path dep must match published macros version (exact pin)
          sed -i 's|blvm-sdk-macros = { version = "=[^"]*", path = "./crates/blvm-sdk-macros" }|blvm-sdk-macros = { version = "='"${VERSION}"'", path = "./crates/blvm-sdk-macros" }|' Cargo.toml
          
          # blvm-node from crates.io
          sed -i 's|blvm-node = { path = "\.\./blvm-node"|blvm-node = "'"${NODE_VER}"'"|g' Cargo.toml
          
          echo "Updated manifests for release ${VERSION}:"
          grep -E "^version = " Cargo.toml crates/blvm-sdk-macros/Cargo.toml
          grep "blvm-sdk-macros = " Cargo.toml
          grep -E "^blvm-node" Cargo.toml
      
      - name: Check for crates.io token
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "⚠️  CARGO_REGISTRY_TOKEN not set, skipping crate publication"
            echo "   Set CARGO_REGISTRY_TOKEN secret to enable crate publishing"
            exit 0
          fi
      
      - name: Configure cargo for crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo login "${CARGO_REGISTRY_TOKEN}"
      
      - name: Verify package manifests
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: |
          (cd crates/blvm-sdk-macros && cargo package --list)
          cargo package --list
      
      - name: Dry-run publish (macros, then SDK)
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: |
          (cd crates/blvm-sdk-macros && cargo publish --dry-run --allow-dirty)
          cargo publish --dry-run --allow-dirty
      
      - name: Check if versions already on crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        id: check-version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for CRATE in blvm-sdk-macros blvm-sdk; do
            API_RESPONSE=$(curl -s --max-time 10 "https://crates.io/api/v1/crates/${CRATE}/versions" 2>/dev/null || echo "")
            EXISTS=false
            if [ -n "$API_RESPONSE" ] && ! echo "$API_RESPONSE" | grep -q '"detail"'; then
              if command -v jq &> /dev/null; then
                V=$(echo "$API_RESPONSE" | jq -r ".versions[] | select(.num == \"${VERSION}\") | .num" | head -1)
                [ "$V" = "$VERSION" ] && EXISTS=true
              elif echo "$API_RESPONSE" | grep -q "\"num\":\"${VERSION}\""; then
                EXISTS=true
              fi
            fi
            if [ "$CRATE" = "blvm-sdk-macros" ]; then
              echo "macros_exists=${EXISTS}" >> $GITHUB_OUTPUT
            else
              echo "sdk_exists=${EXISTS}" >> $GITHUB_OUTPUT
            fi
            echo "  ${CRATE} v${VERSION} exists on crates.io: ${EXISTS}"
          done
      
      - name: Publish blvm-sdk-macros to crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        id: publish_macros
        continue-on-error: true
        run: |
          set +e
          VERSION="${{ steps.version.outputs.version }}"
          if [ "${{ steps.check-version.outputs.macros_exists }}" = "true" ]; then
            echo "Skipping blvm-sdk-macros (already published)"
            echo "published=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          OUT=$(cd crates/blvm-sdk-macros && cargo publish --token "${CARGO_REGISTRY_TOKEN}" --allow-dirty 2>&1)
          CODE=$?
          echo "$OUT"
          if [ $CODE -eq 0 ]; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "Waiting 45s for crates.io to index blvm-sdk-macros..."
            sleep 45
          elif echo "$OUT" | grep -qi "already exists"; then
            echo "published=true" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "published=false" >> $GITHUB_OUTPUT
            exit 0
          fi
      
      - name: Publish blvm-sdk to crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        id: publish_sdk
        continue-on-error: true
        run: |
          set +e
          VERSION="${{ steps.version.outputs.version }}"
          if [ "${{ steps.check-version.outputs.sdk_exists }}" = "true" ]; then
            echo "Skipping blvm-sdk (already published)"
            echo "published=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          OUT=$(cargo publish --token "${CARGO_REGISTRY_TOKEN}" --allow-dirty 2>&1)
          CODE=$?
          echo "$OUT"
          if [ $CODE -eq 0 ]; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "Waiting 30s for crates.io to index blvm-sdk..."
            sleep 30
          elif echo "$OUT" | grep -qi "already exists"; then
            echo "published=true" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "published=false" >> $GITHUB_OUTPUT
            exit 0
          fi
      
      - name: Verify published crates on crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for CRATE in blvm-sdk-macros blvm-sdk; do
            echo "Verifying ${CRATE} v${VERSION}..."
            RETRY=0
            while [ $RETRY -lt 5 ]; do
              if cargo search "$CRATE" --limit 1 2>/dev/null | grep -q "${VERSION}"; then
                echo "✅ https://crates.io/crates/${CRATE}/${VERSION}"
                break
              fi
              RETRY=$((RETRY + 1))
              [ $RETRY -lt 5 ] && sleep 10
            done
          done
