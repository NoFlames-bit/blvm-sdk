name: Security Audit

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit:
    name: Security Audit
    runs-on: [self-hosted, Linux, X64, builds]
    steps:
      - uses: actions/checkout@v4
      
      - name: Checkout blvm-protocol dependency
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-protocol
          path: _temp-blvm-protocol
      
      - name: Checkout blvm-consensus dependency
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-consensus
          path: _temp-blvm-consensus
      
      - name: Checkout blvm-node dependency
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-node
          path: _temp-blvm-node
      
      - name: Move dependencies to parent directory
        run: |
          echo "Current directory: $(pwd)"
          echo "Workspace: ${{ github.workspace }}"
          echo "Listing current directory:"
          ls -la
          echo "Listing parent directory:"
          ls -la .. || true
          echo "Checking for temp directories:"
          ls -la _temp-* || echo "No _temp-* directories found"
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "_temp-blvm-protocol" ]; then mv _temp-blvm-protocol ../blvm-protocol; else echo "ERROR: _temp-blvm-protocol not found!"; exit 1; fi
          if [ -d "_temp-blvm-consensus" ]; then mv _temp-blvm-consensus ../blvm-consensus; else echo "ERROR: _temp-blvm-consensus not found!"; exit 1; fi
          if [ -d "_temp-blvm-node" ]; then mv _temp-blvm-node ../blvm-node; else echo "ERROR: _temp-blvm-node not found!"; exit 1; fi
          echo "✅ Dependencies moved successfully"
          echo "Listing parent directory after move:"
          ls -la .. | grep blvm || echo "No blvm directories found in parent"
          echo "Verifying blvm-node exists:"
          if [ -f "../blvm-node/Cargo.toml" ]; then echo "✅ blvm-node/Cargo.toml found"; else echo "ERROR: blvm-node/Cargo.toml not found!"; exit 1; fi
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.89.0
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.0
      - name: Run security audit
        run: cargo audit




